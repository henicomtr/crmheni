{% extends "admin_layout.html" %}
{% block content %}

<style>
    .admin-page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
        flex-wrap: wrap;
        gap: 12px;
    }

    .admin-page-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
    }

    .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-family: var(--font);
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: var(--transition);
    }

    .btn-back:hover {
        background: var(--surface-3);
        color: var(--text-primary);
    }

    .edit-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
    }

    .edit-card-header {
        padding: 18px 28px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .edit-card-header h2 {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-muted);
    }

    .edit-card-body {
        padding: 28px;
    }

    .form-section-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin: 24px 0 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
    }

    .form-section-title:first-child {
        margin-top: 0;
    }

    .form-grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .form-grid-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .form-group.span-2 {
        grid-column: span 2;
    }

    .form-group.span-full {
        grid-column: 1 / -1;
    }

    .form-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
    }

    .form-control {
        width: 100%;
        padding: 10px 13px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--surface-2);
        font-family: var(--font);
        font-size: 13px;
        color: var(--text-primary);
        outline: none;
        transition: var(--transition);
    }

    .form-control:focus {
        border-color: var(--dark);
        background: var(--surface);
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
    }

    .form-control::placeholder {
        color: var(--text-muted);
    }

    textarea.form-control {
        resize: vertical;
        min-height: 80px;
    }

    .form-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
    }

    .form-actions-right {
        display: flex;
        gap: 10px;
    }

    .btn-delete-supplier {
        padding: 11px 20px;
        background: transparent;
        color: #c0392b;
        border: 1px solid rgba(192, 57, 43, .3);
        border-radius: var(--radius-sm);
        font-family: var(--font);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
    }

    .btn-delete-supplier:hover {
        background: #c0392b;
        color: #fff;
        border-color: #c0392b;
    }

    .btn-cancel {
        padding: 11px 20px;
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-family: var(--font);
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        transition: var(--transition);
    }

    .btn-cancel:hover {
        background: var(--surface-3);
    }

    .btn-submit {
        padding: 11px 28px;
        background: var(--dark);
        color: #fff;
        border: none;
        border-radius: var(--radius-sm);
        font-family: var(--font);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
    }

    .btn-submit:hover {
        background: var(--dark-3);
        transform: translateY(-1px);
    }

    @media (max-width: 768px) {

        .form-grid-2,
        .form-grid-3 {
            grid-template-columns: 1fr;
        }

        .form-group.span-2,
        .form-group.span-full {
            grid-column: span 1;
        }

        .edit-card-body {
            padding: 20px 16px;
        }

        .form-actions {
            flex-direction: column;
            gap: 10px;
            align-items: stretch;
        }

        .form-actions-right {
            flex-direction: column;
        }
    }
</style>

{% endblock %}
